<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Database Konversi — Factory Analytics Hub</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    /* ── Tab Navigation ──────────────────────────────────────────── */
    .db-tabs {
      display: flex;
      gap: 2px;
      border-bottom: 2px solid var(--border-solid2);
      margin-bottom: 20px;
    }
    .db-tab {
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-3);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      border-radius: 6px 6px 0 0;
      transition: color var(--transition), background var(--transition), border-color var(--transition);
      white-space: nowrap;
    }
    .db-tab:hover  { color: var(--text-1); background: var(--bg-2); }
    .db-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(94,106,210,.06); }

    .db-panel { display: none; }
    .db-panel.active { display: flex; flex-direction: column; }

    /* ── Panel table container ───────────────────────────────────── */
    .panel-table-wrap {
      overflow: hidden;
      height: calc(100vh - 212px);
    }
    .panel-table-wrap .table-scroll {
      height: 100%;
      overflow: auto;
    }
    .konv-table {
      font-size: 12px;
      table-layout: auto;
      width: max-content;
      min-width: 100%;
    }
    .konv-table th, .konv-table td {
      padding: 5px 12px;
      white-space: nowrap;
    }
    .konv-table thead th {
      font-size: 11px;
      font-weight: 600;
      background: var(--bg-2);
      position: sticky;
      top: 0;
      z-index: 3;
      box-shadow: 0 2px 4px -1px rgba(0,0,0,0.08);
    }
    .konv-table td:first-child { color: var(--text-4); font-size: 11px; }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebarMount"></div>
  <div class="main-content">
    <div id="topbarMount"></div>
    <div class="page-body">

      <!-- Tab Navigation -->
      <nav class="db-tabs" id="dbTabs">
        <button class="db-tab active" data-tab="plate-infor">Data Plate Infor</button>
        <button class="db-tab"        data-tab="pule">Data PuLe</button>
        <button class="db-tab"        data-tab="type-plate">Data Type Plate</button>
        <button class="db-tab"        data-tab="rate">Data Rate</button>
      </nav>

      <!-- Panel: Data Plate Infor -->
      <div class="db-panel active" id="panel-plate-infor">
        <input type="file" id="file-plate-infor" accept=".xlsx,.xls" style="display:none"/>
        <div class="flex items-center gap-3 mb-4">
          <span class="stat-value" id="count-plate-infor" style="font-size:20px">0</span>
          <span class="text-muted text-sm">entri</span>
          <div class="ml-auto flex gap-2">
            <input type="text" class="form-control konv-search" data-tab="plate-infor" placeholder="Cari..." style="width:200px"/>
            <button class="btn btn-ghost btn-sm konv-upload-btn" data-tab="plate-infor">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Upload
            </button>
            <button class="btn btn-ghost btn-sm konv-export-btn" data-tab="plate-infor">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Export Excel
            </button>
            <button class="btn btn-danger btn-sm konv-clear-btn" data-tab="plate-infor">Hapus Semua</button>
          </div>
        </div>
        <div class="panel-table-wrap table-wrap">
          <div class="table-scroll">
            <table class="konv-table" id="table-plate-infor">
              <thead><tr><th>No</th><th>— Belum ada data —</th></tr></thead>
              <tbody id="tbody-plate-infor"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Panel: Data PuLe -->
      <div class="db-panel" id="panel-pule">
        <input type="file" id="file-pule" accept=".xlsx,.xls" style="display:none"/>
        <div class="flex items-center gap-3 mb-4">
          <span class="stat-value" id="count-pule" style="font-size:20px">0</span>
          <span class="text-muted text-sm">entri</span>
          <div class="ml-auto flex gap-2">
            <input type="text" class="form-control konv-search" data-tab="pule" placeholder="Cari..." style="width:200px"/>
            <button class="btn btn-ghost btn-sm konv-upload-btn" data-tab="pule">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Upload
            </button>
            <button class="btn btn-ghost btn-sm konv-export-btn" data-tab="pule">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Export Excel
            </button>
            <button class="btn btn-danger btn-sm konv-clear-btn" data-tab="pule">Hapus Semua</button>
          </div>
        </div>
        <div class="panel-table-wrap table-wrap">
          <div class="table-scroll">
            <table class="konv-table" id="table-pule">
              <thead><tr><th>No</th><th>— Belum ada data —</th></tr></thead>
              <tbody id="tbody-pule"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Panel: Data Type Plate -->
      <div class="db-panel" id="panel-type-plate">
        <input type="file" id="file-type-plate" accept=".xlsx,.xls" style="display:none"/>
        <div class="flex items-center gap-3 mb-4">
          <span class="stat-value" id="count-type-plate" style="font-size:20px">0</span>
          <span class="text-muted text-sm">entri</span>
          <div class="ml-auto flex gap-2">
            <input type="text" class="form-control konv-search" data-tab="type-plate" placeholder="Cari..." style="width:200px"/>
            <button class="btn btn-ghost btn-sm konv-upload-btn" data-tab="type-plate">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Upload
            </button>
            <button class="btn btn-ghost btn-sm konv-export-btn" data-tab="type-plate">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Export Excel
            </button>
            <button class="btn btn-danger btn-sm konv-clear-btn" data-tab="type-plate">Hapus Semua</button>
          </div>
        </div>
        <div class="panel-table-wrap table-wrap">
          <div class="table-scroll">
            <table class="konv-table" id="table-type-plate">
              <thead><tr><th>No</th><th>— Belum ada data —</th></tr></thead>
              <tbody id="tbody-type-plate"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Panel: Data Rate -->
      <div class="db-panel" id="panel-rate">
        <input type="file" id="file-rate" accept=".xlsx,.xls" style="display:none"/>
        <div class="flex items-center gap-3 mb-4">
          <span class="stat-value" id="count-rate" style="font-size:20px">0</span>
          <span class="text-muted text-sm">entri</span>
          <div class="ml-auto flex gap-2">
            <input type="text" class="form-control konv-search" data-tab="rate" placeholder="Cari..." style="width:200px"/>
            <button class="btn btn-ghost btn-sm konv-upload-btn" data-tab="rate">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Upload
            </button>
            <button class="btn btn-ghost btn-sm konv-export-btn" data-tab="rate">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Export Excel
            </button>
            <button class="btn btn-danger btn-sm konv-clear-btn" data-tab="rate">Hapus Semua</button>
          </div>
        </div>
        <div class="panel-table-wrap table-wrap">
          <div class="table-scroll">
            <table class="konv-table" id="table-rate">
              <thead><tr><th>No</th><th>— Belum ada data —</th></tr></thead>
              <tbody id="tbody-rate"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="shared-components.js"></script>
<script>
// Map tab key → state key
const TAB_STATE_KEY = {
  'plate-infor': 'dbPlateInfor',
  'pule':        'dbPuLe',
  'type-plate':  'dbTypePlate',
  'rate':        'dbRate',
};

const TAB_LABEL = {
  'plate-infor': 'Data Plate Infor',
  'pule':        'Data PuLe',
  'type-plate':  'Data Type Plate',
  'rate':        'Data Rate',
};

function pageInit() {
  document.getElementById('topbarMount').innerHTML = BPMS.renderTopbar('Database Konversi');

  // Tab switching
  document.getElementById('dbTabs').addEventListener('click', e => {
    const btn = e.target.closest('.db-tab');
    if (!btn) return;
    const tab = btn.dataset.tab;
    document.querySelectorAll('.db-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.db-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
  });

  // Wire upload buttons
  document.querySelectorAll('.konv-upload-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('file-' + btn.dataset.tab).click();
    });
  });

  // Wire file inputs
  document.querySelectorAll('input[type=file][id^=file-]').forEach(input => {
    const tab = input.id.replace('file-', '');
    input.addEventListener('change', () => {
      if (input.files[0]) handleFile(tab, input.files[0]);
      input.value = '';
    });
  });

  // Wire export buttons
  document.querySelectorAll('.konv-export-btn').forEach(btn => {
    btn.addEventListener('click', () => exportExcel(btn.dataset.tab));
  });

  // Wire clear buttons
  document.querySelectorAll('.konv-clear-btn').forEach(btn => {
    btn.addEventListener('click', () => clearData(btn.dataset.tab));
  });

  // Wire search inputs
  document.querySelectorAll('.konv-search').forEach(input => {
    input.addEventListener('input', () => renderTable(input.dataset.tab));
  });

  // Initial render all panels
  Object.keys(TAB_STATE_KEY).forEach(tab => renderTable(tab));
}

// ── Render ────────────────────────────────────────────────────────

function getData(tab) {
  const state = BPMS.getState();
  return state[TAB_STATE_KEY[tab]] || [];
}

function renderTable(tab) {
  const allRows = getData(tab);
  const q       = document.querySelector(`.konv-search[data-tab="${tab}"]`)?.value.toLowerCase() || '';
  const filtered = q
    ? allRows.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q)))
    : allRows;

  document.getElementById('count-' + tab).textContent = allRows.length;

  const tableEl = document.getElementById('table-' + tab);
  const tbody   = document.getElementById('tbody-' + tab);

  if (!allRows.length) {
    tableEl.querySelector('thead').innerHTML =
      '<tr><th>No</th><th>— Belum ada data. Upload file Excel untuk memulai. —</th></tr>';
    tbody.innerHTML = '';
    return;
  }

  const cols = Object.keys(allRows[0]);
  tableEl.querySelector('thead').innerHTML =
    `<tr><th>No</th>${cols.map(c => `<th>${c}</th>`).join('')}</tr>`;

  tbody.innerHTML = filtered.length
    ? filtered.map((row, i) =>
        `<tr><td>${i + 1}</td>${cols.map(c => `<td>${row[c] ?? ''}</td>`).join('')}</tr>`
      ).join('')
    : `<tr><td colspan="${cols.length + 1}"><div class="empty-state" style="padding:24px">
        <div class="empty-title">Tidak ada hasil pencarian</div>
       </div></td></tr>`;
}

// ── Upload ────────────────────────────────────────────────────────

function handleFile(tab, file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb   = XLSX.read(e.target.result, { type: 'binary' });
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
      if (!rows.length) { BPMS.toast('File kosong atau format tidak dikenali', 'error'); return; }

      const state = BPMS.getState();
      state[TAB_STATE_KEY[tab]] = rows;
      BPMS.saveState().then(() => {
        BPMS.toast(`${rows.length} entri ${TAB_LABEL[tab]} berhasil diimport`, 'success');
        renderTable(tab);
      });
    } catch (err) {
      BPMS.toast('Gagal membaca file: ' + err.message, 'error');
    }
  };
  reader.readAsBinaryString(file);
}

// ── Export ────────────────────────────────────────────────────────

function exportExcel(tab) {
  const rows = getData(tab);
  if (!rows.length) { BPMS.toast('Tidak ada data untuk diekspor', 'error'); return; }
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, TAB_LABEL[tab]);
  XLSX.writeFile(wb, `FAH_${TAB_STATE_KEY[tab]}.xlsx`);
  BPMS.toast('Export berhasil', 'success');
}

// ── Clear ─────────────────────────────────────────────────────────

function clearData(tab) {
  if (!confirm(`Hapus semua data ${TAB_LABEL[tab]}?`)) return;
  const state = BPMS.getState();
  state[TAB_STATE_KEY[tab]] = [];
  BPMS.saveState().then(() => {
    BPMS.toast('Data dihapus', 'info');
    renderTable(tab);
  });
}
</script>
</body>
</html>
